name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Dump environment
        run: python -c "import os, platform, sys; print(sys.version); print(platform.platform()); print(os.getcwd())"
      - name: Prepare test diagnostics
        run: python -c "from pathlib import Path; Path('.tmp/ci-results').mkdir(parents=True, exist_ok=True)"
      - name: Run tests
        run: python -m pytest --basetemp .tmp/pytest_ci --junitxml .tmp/ci-results/junit.xml -x -vv --tb=long --durations=20
      - name: Validate contracts
        run: python tools/check_contracts.py
      - name: Validate release artifacts
        run: python tools/check_release.py
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .tmp/ci-results/
          if-no-files-found: warn
          retention-days: 7
